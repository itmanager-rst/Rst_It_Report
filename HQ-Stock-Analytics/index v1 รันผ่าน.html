<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min-Max Procurement Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-indigo-600 text-white shadow-md px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-semibold tracking-wide flex items-center gap-2">
                📦 ระบบคำนวณและสั่งสินค้า Min-Max (Ecount Native Dynamic)
            </h1>
            <span class="bg-indigo-500 text-xs px-3 py-1.5 rounded-full border border-indigo-400">ระบบข้ามหัวตาราง Ecount อัตโนมัติ</span>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <div class="bg-white rounded-xl shadow-sm p-6 mb-6 flex flex-col sm:flex-row gap-4 justify-between items-center border border-slate-100">
            <div class="w-full sm:w-96">
                <input type="text" id="searchInput" onkeyup="searchTable()" placeholder="🔍 ค้นหารหัสสินค้า หรือ ชื่อสินค้า..." class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
            </div>
            <div class="flex gap-4 items-center">
                <button onclick="fetchDataFromAPI()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-2 rounded-lg shadow-sm transition flex items-center gap-1.5 cursor-pointer">
                    🔄 รีเฟรชข้อมูล
                </button>
                <span class="flex items-center gap-1.5 text-xs text-slate-500 bg-slate-100 px-3 py-2 rounded-lg">
                    <span class="w-2.5 h-2.5 rounded-full bg-red-500 inline-block animate-pulse"></span> สต็อกวิกฤต (ต่ำกว่า Min)
                </span>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse" id="productTable">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-100 text-slate-600 text-xs font-semibold uppercase tracking-wider">
                            <th class="px-6 py-4">รหัสสินค้า</th>
                            <th class="px-6 py-4">ชื่อสินค้า</th>
                            <th class="px-6 py-4 text-center">คงเหลือปัจจุบัน</th>
                            <th class="px-6 py-4 text-center">ค่า Min (จำลอง)</th>
                            <th class="px-6 py-4 text-center">ค่า Max (จำลอง)</th>
                            <th class="px-6 py-4 text-center">สถานะ</th>
                            <th class="px-6 py-4 text-right">จำนวนที่ควรสั่งเพิ่ม</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100 text-sm text-slate-700" id="tableBody">
                        <tr>
                            <td colspan="7" class="px-6 py-10 text-center text-slate-400">
                                <div class="inline-block animate-spin rounded-full h-5 w-5 border-b-2 border-indigo-600 mr-2"></div>
                                กำลังดึงข้อมูลและกรองข้อมูลจาก Ecount...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // ⚠️ นำ URL Web App ที่ได้จากการ Deploy ใหม่ใน Google Apps Script มาวางตรงนี้ครับ
        const API_URL = "https://script.google.com/macros/s/AKfycbx0KI8zolfEcmOOaJIzpOgLsm3CGRXG1fMvV9Cg7SxyPSRTgRzAhqAToly3YZ5MqkG1/exec";

        document.addEventListener('DOMContentLoaded', function() {
            fetchDataFromAPI();
        });

        function fetchDataFromAPI() {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = `
                <tr>
                    <td colspan="7" class="px-6 py-10 text-center text-slate-400">
                        <div class="inline-block animate-spin rounded-full h-5 w-5 border-b-2 border-indigo-600 mr-2"></div>
                        กำลังประมวลผลสถาปัตยกรรมข้อมูลตามหลัก Algorithm...
                    </td>
                </tr>`;

            if(API_URL === "วาง_URL_WEB_APP_ที่นี่" || API_URL === "") {
                tableBody.innerHTML = `<tr><td colspan="7" class="px-6 py-10 text-center text-amber-600 bg-amber-50">⚠️ โปรดนำ URL Web App จาก Google Script มาใส่ในโค้ดบรรทัดที่ 77 ก่อนครับ</td></tr>`;
                return;
            }

            fetch(API_URL)
                .then(response => response.json())
                .then(data => renderDashboard(data))
                .catch(err => {
                    tableBody.innerHTML = `
                        <tr>
                            <td colspan="7" class="px-6 py-10 text-center text-red-500">
                                ❌ เกิดข้อผิดพลาด: ${err.message}<br>
                                <span class="text-xs text-slate-400">โปรดตรวจสอบเวอร์ชันการ Deploy บน Google Script</span>
                            </td>
                        </tr>`;
                });
        }

        function renderDashboard(data) {
            const tableBody = document.getElementById('tableBody');
            
            if (!data || !data.stock || data.stock.length <= 1) {
                tableBody.innerHTML = `<tr><td colspan="7" class="px-6 py-10 text-center text-slate-400">⚠️ ไม่พบข้อมูลโครงสร้างสินค้าในชีต Stock_Master</td></tr>`;
                return;
            }

            tableBody.innerHTML = ''; 
            
            const stockRows = data.stock;
            // เนื่องจากข้ามแถวแรกมาจากหลังบ้านแล้ว แถวที่ 0 ของ data.stock จึงเป็นหัวตารางจริง (แถวที่ 2 ในชีต)
            const stockHeader = stockRows[0].map(h => String(h).trim());
            
            // จับคู่ดัชนีคอลัมน์ตามชื่อเป๊ะๆ ของไฟล์ Ecount จากภาพล่าสุดของคุณ
            const codeIdx = stockHeader.findIndex(h => h === 'รหัสสินค้า');
            const nameIdx = stockHeader.findIndex(h => h.includes('ชื่อสินค้า'));
            const qtyIdx = stockHeader.findIndex(h => h === 'จำนวนคงเหลือ');

            if (codeIdx === -1 || qtyIdx === -1) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="7" class="px-6 py-10 text-center text-amber-600 bg-amber-50">
                            ⚠️ โครงสร้างไฟล์ Ecount คลาดเคลื่อน ตัวแปลง Code หาคอลัมน์ "รหัสสินค้า" หรือ "จำนวนคงเหลือ" ไม่พบ
                        </td>
                    </tr>`;
                return;
            }

            let textRowsHTML = '';

            // วนลูปสินค้า (เริ่มแถวที่ 1 เพราะแถวที่ 0 คือหัวตารางจริง)
            for(let i = 1; i < stockRows.length; i++) {
                const row = stockRows[i];
                if(!row[codeIdx] || row[codeIdx] === 'ลำดับ') continue; // ข้ามแถวว่าง หรือ แถวสรุป

                const code = row[codeIdx];
                const name = nameIdx !== -1 ? row[nameIdx] : '-';
                const currentStock = Number(row[qtyIdx]) || 0;
                
                // 💡 เนื่องจากไฟล์ Ecount ไม่มีช่อง Min/Max ตัวโค้ดจึงขอนำเสนอระบบจำลอง Algorithm:
                // สมมติให้ค่าเซฟตี้พื้นฐาน Min = 5 ชิ้น และ Max = 50 ชิ้น เพื่อให้คุณเห็นการทำงานของระบบสั่งซื้อ
                const minVal = 5; 
                const maxVal = 50; 

                let statusBadge = '';
                let orderQty = 0;

                if (currentStock <= minVal) {
                    statusBadge = `<span class="bg-red-50 text-red-600 px-2.5 py-1 rounded-full text-xs font-medium border border-red-100">🔴 ต้องสั่งด่วน</span>`;
                    orderQty = maxVal - currentStock; 
                } else {
                    statusBadge = `<span class="bg-green-50 text-green-600 px-2.5 py-1 rounded-full text-xs font-medium border border-green-100">🟢 ปกติ</span>`;
                    orderQty = 0;
                }

                textRowsHTML += `
                    <tr class="${currentStock <= minVal ? 'bg-red-50/30 hover:bg-red-50/50' : 'hover:bg-slate-50'} transition">
                        <td class="px-6 py-4 font-medium text-slate-900">${code}</td>
                        <td class="px-6 py-4 text-slate-600 text-xs max-w-xs truncate" title="${name}">${name}</td>
                        <td class="px-6 py-4 text-center font-semibold">${currentStock.toLocaleString()}</td>
                        <td class="px-6 py-4 text-center text-slate-400">${minVal.toLocaleString()}</td>
                        <td class="px-6 py-4 text-center text-slate-400">${maxVal.toLocaleString()}</td>
                        <td class="px-6 py-4 text-center">${statusBadge}</td>
                        <td class="px-6 py-4 text-right font-bold ${orderQty > 0 ? 'text-red-600 text-base' : 'text-slate-400'}">
                            ${orderQty > 0 ? orderQty.toLocaleString() + ' ชิ้น' : '-'}
                        </td>
                    </tr>
                `;
            }

            tableBody.innerHTML = textRowsHTML;
        }

        function searchTable() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const rows = document.getElementById('tableBody').getElementsByTagName('tr');
            
            for (let i = 0; i < rows.length; i++) {
                const text = rows[i].textContent.toLowerCase();
                rows[i].style.display = text.includes(input) ? '' : 'none';
            }
        }
    </script>
</body>
</html>
